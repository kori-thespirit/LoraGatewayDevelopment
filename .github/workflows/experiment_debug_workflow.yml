name: Experiment and Debug workflow

on:
  workflow_call:
    inputs:
      unit_test_project:
        type: string

env:
  unit_test_path: "code/unit-test"

jobs:
  experiment:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          unit_test_project: ${{ github.event.inputs.unit_test_project }}
      - name: experiment
        shell: bash
        run: |
          echo "Using project unit-test ${{ github.event.inputs.unit_test_project }}"
          PROJECT_PATH="${{ env.unit_test_path }}/unit-test_rtc_ds3231"
          if [[ "${{ github.event.inputs.unit_test_project }}" == "RTC-DS3231" ]]; then
            echo "Run project ${{ github.event.inputs.unit_test_project }} at the path ${PROJECT_PATH}"
            ls ${PROJECT_PATH}
          else
            echo "Fail to run unit-test project"
          fi
