name: Experiment and Debug workflow

on:
  workflow_call:
    inputs:
      unit_test_project:
        type: string

env:
  unit_test_path: "code/unit-test"

jobs:
  experiment:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          unit_test_project: ${{ github.event.inputs.unit_test_project }}
      - name: experiment
        shell: bash
        run: |
          echo "Using project unit-test ${{ github.event.inputs.unit_test_project }}"
          PROJECT_PATH="${{ env.unit_test_path }}/${{ github.event.inputs.unit_test_project }}"
          if [[ "${{ github.event.inputs.unit_test_project }}" == "unit-test_mqtts_cloud_vps_broker" ]]; then
            CERTIFICATE_PATH="${PROJECT_PATH}/components/network/mqtts/certificates"
            echo "Run project ${{ github.event.inputs.unit_test_project }} needs to add certificate first"
            echo "At path ${CERTIFICATE_PATH}"
            ls ${CERTIFICATE_PATH}
          else
            echo "Run project ${{ github.event.inputs.unit_test_project }} at the path ${PROJECT_PATH}"
            ls ${PROJECT_PATH}
          fi
