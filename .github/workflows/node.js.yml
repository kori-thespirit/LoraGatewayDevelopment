name: ESP32 Hardware Test

on:
  push:

jobs:
  test-on-hardware:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load ESP-IDF
        run: |
          source "/mnt/hdd_WD10JPVT_1TB/p256GB/share-resource/.espressif/tools/activate_idf_v5.5.4.sh"
      - name: Clean build
        run: |
          rm -rf build
      - name: Build
        run: |
          source "/mnt/hdd_WD10JPVT_1TB/p256GB/share-resource/.espressif/tools/activate_idf_v5.5.4.sh"
          idf.py build
          
      - name: Flash ESP32
        run: idf.py -p /dev/ttyACM0 flash
        
      - name: Wait for boot
        run: sleep 3
        
      - name: Run pytest
        run: pytest -v -s test_v2.py
